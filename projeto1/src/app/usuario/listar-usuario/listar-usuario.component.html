<div style="display: flex;  flex-wrap: wrap;">
  <mat-card *ngFor="let usuario of usuarios" class="mat-card-simples" style="margin: 5px;">
    <mat-card-header>
      <mat-card-title>
        <mat-icon>person</mat-icon>
        {{usuario.nome}}</mat-card-title>
      <mat-card-subtitle *ngIf="usuario.cpf">CPF: {{usuario.cpf}} Idade: {{usuario.idade}}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <ul>
        <li>Escritor</li>
        <li>Empatico</li>
        <li>Colaborador</li>
        <li>Organizado</li>
        <li>Flexivel</li>
      </ul>
    </mat-card-content>
  </mat-card>
</div>
